  <script type="application/ld+json">{"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": [{"@type": "Question", "name": "What is zone 2 cardio?", "acceptedAnswer": {"@type": "Answer", "text": "Zone 2 is exercise at 60-70% of max heart rate where you can hold a full conversation but couldn't sing. It primarily develops mitochondrial density and efficiency, which are the foundations of cardiovascular fitness and longevity."}}, {"@type": "Question", "name": "How much zone 2 cardio per week for longevity?", "acceptedAnswer": {"@type": "Answer", "text": "Research consistently shows 150+ minutes per week is the threshold for significant cardiovascular benefit. This can be split across dedicated sessions (2-3 per week, 30-45 min each) and warm-ups before strength training."}}, {"@type": "Question", "name": "Is zone 2 better than HIIT for longevity?", "acceptedAnswer": {"@type": "Answer", "text": "For longevity specifically, yes. Zone 2 produces unique mitochondrial density adaptations that HIIT cannot replicate. The ideal program includes both \u2014 zone 2 as the base (80% of cardio volume) with HIIT as a supplement (20%)."}}]}</script>
